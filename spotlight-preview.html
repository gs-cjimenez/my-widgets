<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Spotlight — Preview</title>
  <style>
    body {
      background: #f0f2f5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 100vh; gap: 20px; padding: 40px 0;
    }
    .page-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #888; }
    .widget-frame { width: 100%; }

    .spotlight-widget {
      background: linear-gradient(135deg, #1a3c5e 0%, #2563a8 100%);
      width: 100%; padding: 24px 40px;
      display: flex; align-items: center; justify-content: center;
      gap: 32px; flex-wrap: wrap;
    }
    .sp-label { text-align: center; flex-shrink: 0; }
    .sp-label-title { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.70); margin-bottom: 2px; }
    .sp-label-sub { font-size: 11px; color: rgba(255,255,255,0.45); }
    .sp-divider { width: 1px; height: 56px; background: rgba(255,255,255,0.20); flex-shrink: 0; }
    .sp-avatar {
      width: 64px; height: 64px; border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; font-weight: 700; color: #fff;
      border: 3px solid rgba(255,255,255,0.30);
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      overflow: hidden; flex-shrink: 0;
    }
    .sp-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .sp-identity { flex-shrink: 0; }
    .sp-name { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 5px; }
    .sp-rank {
      display: inline-flex; align-items: center; gap: 4px;
      background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25);
      color: #fff; font-size: 11px; font-weight: 600;
      padding: 3px 10px; border-radius: 20px;
    }
    .sp-stats { display: flex; gap: 24px; align-items: center; flex-shrink: 0; }
    .sp-stat { text-align: center; }
    .sp-stat-value { font-size: 20px; font-weight: 700; color: #fff; }
    .sp-stat-label { font-size: 9px; font-weight: 600; color: rgba(255,255,255,0.55); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 1px; }
    .sp-stat-divider { width: 1px; height: 36px; background: rgba(255,255,255,0.20); }
    .sp-cta {
      display: inline-block;
      background: rgba(255,255,255,0.15); border: 1.5px solid rgba(255,255,255,0.40);
      color: #fff; font-size: 12px; font-weight: 600;
      padding: 9px 20px; border-radius: 8px;
      text-decoration: none; white-space: nowrap; flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="page-label">Widget Preview — Full Width User Spotlight</div>
  <div class="widget-frame">
    <div class="spotlight-widget">
      <div class="sp-label">
        <div class="sp-label-title">⭐ Member Spotlight</div>
        <div class="sp-label-sub">Top contributor this month</div>
      </div>
      <div class="sp-divider"></div>
      <div class="sp-avatar">I</div>
      <div class="sp-identity">
        <div class="sp-name">Igor</div>
        <div class="sp-rank">✦ Inspiring</div>
      </div>
      <div class="sp-divider"></div>
      <div class="sp-stats">
        <div class="sp-stat"><div class="sp-stat-value">173</div><div class="sp-stat-label">Points</div></div>
        <div class="sp-stat-divider"></div>
        <div class="sp-stat"><div class="sp-stat-value">7</div><div class="sp-stat-label">Topics</div></div>
        <div class="sp-stat-divider"></div>
        <div class="sp-stat"><div class="sp-stat-value">1</div><div class="sp-stat-label">Solutions</div></div>
      </div>
      <div class="sp-divider"></div>
      <a class="sp-cta" href="#">View Profile →</a>
    </div>
  </div>
</body>
</html>
