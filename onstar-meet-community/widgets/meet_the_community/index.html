<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  :host {
    display: block;
    font-family: var(--config--main-font-family, 'Inter', sans-serif);
  }

  .section-title {
    text-align: center;
    font-size: 28px;
    font-weight: 700;
    color: var(--config--main-color-text, #1a1a1a);
    margin-bottom: 32px;
  }

  .carousel-wrapper {
    position: relative;
    overflow: hidden;
  }

  .carousel-track {
    display: flex;
    transition: transform 0.4s ease;
  }

  .slide {
    display: flex;
    gap: 24px;
    min-width: 100%;
    padding: 0 4px 4px;
  }

  /* ── Member Card ── */
  .member-card {
    flex: 1;
    display: flex;
    background: #ffffff;
    border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.10);
    overflow: hidden;
    min-height: 220px;
  }

  .accent-bar {
    width: 20px;
    flex-shrink: 0;
    border-radius: 12px 0 0 12px;
  }

  .avatar-col {
    width: 110px;
    flex-shrink: 0;
    position: relative;
    display: flex;
    align-items: flex-start;
    padding-top: 20px;
    justify-content: center;
  }

  .avatar-col img {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #ffffff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    background: #e5e7eb;
  }

  .avatar-placeholder {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: var(--card-accent, #2563eb);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: 700;
    color: #fff;
    border: 3px solid #ffffff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }

  .card-body {
    flex: 1;
    padding: 20px 20px 20px 8px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .member-name {
    font-size: 18px;
    font-weight: 700;
    color: var(--config--main-color-text, #111827);
    line-height: 1.2;
  }

  .member-title {
    font-size: 13px;
    color: #6b7280;
    margin-bottom: 2px;
  }

  .member-handle a {
    font-size: 13px;
    color: var(--config--main-color-brand, #2563eb);
    text-decoration: none;
  }

  .member-handle a:hover {
    text-decoration: underline;
  }

  .member-location {
    font-size: 13px;
    color: #374151;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .divider {
    border: none;
    border-top: 1px solid var(--config--main-color-border, #e5e7eb);
    margin: 8px 0;
  }

  .card-section-label {
    font-size: 13px;
    font-weight: 700;
    color: var(--config--main-color-text, #111827);
    margin-bottom: 2px;
  }

  .card-section-value {
    font-size: 13px;
    color: #4b5563;
    line-height: 1.5;
  }

  /* ── Pagination dots ── */
  .pagination {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 20px;
  }

  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #d1d5db;
    border: none;
    padding: 0;
    cursor: pointer;
    transition: background 0.2s;
  }

  .dot.active {
    background: var(--config--main-color-brand, #2563eb);
  }

  /* ── Nav arrows ── */
  .nav-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 50%;
    width: 36px;
    height: 36px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    z-index: 2;
    font-size: 16px;
    color: #374151;
    transition: background 0.15s;
  }

  .nav-btn:hover { background: #f3f4f6; }
  .nav-btn.prev { left: -16px; }
  .nav-btn.next { right: -16px; }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
</style>

<h2 class="section-title">Meet the community</h2>

<div class="carousel-wrapper">
  <button class="nav-btn prev" id="prevBtn" aria-label="Previous">&#8249;</button>
  <div class="carousel-track" id="carouselTrack"></div>
  <button class="nav-btn next" id="nextBtn" aria-label="Next">&#8250;</button>
</div>

<div class="pagination" id="pagination"></div>

<script type="module" src="app.js"></script>
