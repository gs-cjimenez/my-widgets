<style>
  *,
  *::before,
  *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  .outer {
    width: 100%;
    padding: 0 16px;
  }

  .banner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 20px;
    background: var(--lp-banner-bg, #f0f4fa);
    border-left: 4px solid var(--lp-accent, #1b3a6b);
    border-radius: 6px;
    font-family: var(--config--main-font-family, system-ui, sans-serif);
    text-decoration: none;
    cursor: pointer;
    transition: filter 0.15s ease;
  }

  .banner:hover {
    filter: brightness(0.96);
  }

  .logo-wrap {
    flex-shrink: 0;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--lp-accent, #1b3a6b);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .logo-wrap img {
    width: 28px;
    height: 28px;
    object-fit: contain;
  }

  .logo-wrap .logo-fallback {
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 700;
    color: var(--lp-logo-text, #fff);
  }

  .text {
    flex: 1;
    min-width: 0;
  }

  .eyebrow {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--lp-eyebrow, #e85d26);
    display: flex;
    align-items: center;
    gap: 5px;
    margin-bottom: 2px;
  }

  .eyebrow-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--lp-eyebrow, #e85d26);
    flex-shrink: 0;
  }

  .title {
    font-size: 15px;
    font-weight: 600;
    color: var(--lp-title, #111827);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .cta-btn {
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 20px;
    background: var(--lp-cta-bg, #1b3a6b);
    color: var(--lp-cta-text, #fff);
    font-size: 13px;
    font-weight: 600;
    border-radius: 6px;
    white-space: nowrap;
    transition: filter 0.15s ease;
  }

  .banner:hover .cta-btn {
    filter: brightness(0.88);
  }

  .cta-arrow {
    font-size: 14px;
  }
</style>

<div class="outer">
  <a class="banner" id="banner" href="#" target="_blank" rel="noopener noreferrer">
    <div class="logo-wrap" id="logoWrap">
      <span class="logo-fallback" id="logoFallback">DB</span>
    </div>
    <div class="text">
      <div class="eyebrow"><span class="eyebrow-dot"></span><span id="eyebrowText">New Learning Path</span></div>
      <div class="title" id="titleText">Databricks Analytics Fundamentals Accreditation</div>
    </div>
    <div class="cta-btn"><span id="ctaText">Explore Flows</span><span class="cta-arrow">→</span></div>
  </a>
</div>

<script type="module" src="app.js"></script>
