<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :host { display: block; font-family: var(--config--main-font-family, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif); }

  .outer {
    display: flex;
    justify-content: center;
    padding: 0.5rem 1rem;
  }

  .banner {
    display: flex;
    align-items: center;
    width: 100%;
    max-width: 1100px;
    background: #f0f4f8;
    border-radius: 8px;
    overflow: hidden;
    min-height: 72px;
    gap: 0;
  }

  .accent-bar {
    width: 5px;
    align-self: stretch;
    background: #2563eb;
    flex-shrink: 0;
  }

  .icon-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: #1e293b;
    flex-shrink: 0;
    margin: 0 1rem 0 1.25rem;
    overflow: hidden;
  }

  .icon-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
  }

  .icon-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .icon-placeholder svg {
    width: 28px;
    height: 28px;
  }

  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0.875rem 0;
    min-width: 0;
  }

  .eyebrow {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.6875rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #2563eb;
    margin-bottom: 0.2rem;
    line-height: 1;
  }

  .eyebrow-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #2563eb;
    flex-shrink: 0;
  }

  .title {
    font-size: 1rem;
    font-weight: 700;
    color: #111827;
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .cta-wrap {
    flex-shrink: 0;
    padding: 0 1.25rem 0 1rem;
  }

  .cta-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.375rem;
    padding: 0.5rem 1.125rem;
    border-radius: 999px;
    background: #1e293b;
    color: #ffffff;
    font-size: 0.875rem;
    font-weight: 600;
    text-decoration: none;
    white-space: nowrap;
    border: none;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .cta-btn:hover { opacity: 0.85; }

  .cta-arrow {
    font-size: 1rem;
    line-height: 1;
  }
</style>

<div class="outer">
  <div class="banner">
    <div class="accent-bar"></div>
    <div class="icon-wrap">
      <div class="icon-placeholder">
        <!-- Default: graduation cap icon -->
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 3L1 9L12 15L21 10.09V17H23V9L12 3Z" fill="white"/>
          <path d="M5 13.18V17.18L12 21L19 17.18V13.18L12 17L5 13.18Z" fill="white"/>
        </svg>
      </div>
    </div>
    <div class="content">
      <div class="eyebrow">
        <span class="eyebrow-dot"></span>
        <span class="eyebrow-text">New Learning Path</span>
      </div>
      <div class="title">Analytics Fundamentals</div>
    </div>
    <div class="cta-wrap">
      <a class="cta-btn" href="#" target="_blank" rel="noopener">
        <span class="cta-label">Start Learning</span>
        <span class="cta-arrow">→</span>
      </a>
    </div>
  </div>
</div>

<script type="module" src="app.js"></script>
