<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  .banner {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 20px;
    background: #f5f7fa;
    border-left: 4px solid var(--accent, #1B3B6F);
    border-radius: 6px;
    font-family: var(--config--main-font-family, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif);
    min-height: 64px;
  }

  .logo-wrap {
    flex-shrink: 0;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #1B3B6F;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .logo-img {
    width: 26px;
    height: 26px;
    object-fit: contain;
    display: block;
  }

  .logo-fallback {
    width: 26px;
    height: 26px;
    display: none;
    align-items: center;
    justify-content: center;
  }

  .logo-fallback svg {
    width: 22px;
    height: 22px;
    fill: #ffffff;
  }

  .content {
    flex: 1;
    min-width: 0;
  }

  .badge {
    display: flex;
    align-items: center;
    gap: 5px;
    margin-bottom: 3px;
  }

  .badge-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent, #1B3B6F);
    flex-shrink: 0;
  }

  .badge-text {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent, #1B3B6F);
  }

  .course-title {
    font-size: 15px;
    font-weight: 700;
    color: #1a1a2e;
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .cta-btn {
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 20px;
    background: var(--btn-bg, #1B3B6F);
    color: #ffffff;
    font-size: 13px;
    font-weight: 600;
    text-decoration: none;
    border-radius: 999px;
    white-space: nowrap;
    transition: opacity 0.15s ease;
    cursor: pointer;
    border: none;
    font-family: inherit;
    letter-spacing: 0.01em;
  }

  .cta-btn:hover {
    opacity: 0.85;
  }

  .arrow {
    font-size: 14px;
    line-height: 1;
  }

  @media (max-width: 520px) {
    .banner {
      flex-wrap: wrap;
      gap: 12px;
    }
    .cta-btn {
      width: 100%;
      justify-content: center;
    }
    .course-title {
      white-space: normal;
    }
  }
</style>

<div class="banner">
  <div class="logo-wrap" id="logoWrap">
    <img class="logo-img" id="logoImg" src="" alt="" />
    <span class="logo-fallback" id="logoFallback">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>
    </span>
  </div>

  <div class="content">
    <div class="badge">
      <span class="badge-dot" id="badgeDot"></span>
      <span class="badge-text" id="badgeText">NEW LEARNING PATH</span>
    </div>
    <div class="course-title" id="courseTitle">Analytics Fundamentals</div>
  </div>

  <a class="cta-btn" id="ctaBtn" href="#" target="_blank" rel="noopener noreferrer">
    <span id="ctaText">Start Learning</span>
    <span class="arrow">→</span>
  </a>
</div>

<script type="module" src="app.js"></script>
