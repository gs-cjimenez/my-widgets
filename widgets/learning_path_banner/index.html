<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  .lp-banner {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 20px 14px 0;
    border-left: 4px solid var(--accent-color, #FF3621);
    background: var(--config--main-color-background, #ffffff);
    font-family: var(--config--main-font-family, sans-serif);
    border-radius: 0 8px 8px 0;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }

  .lp-icon-wrap {
    flex-shrink: 0;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    overflow: hidden;
    background: #1b1b1b;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-left: 16px;
  }

  .lp-icon-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .lp-icon-fallback {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 700;
    color: #ffffff;
    background: #1b1b1b;
  }

  .lp-content {
    flex: 1;
    min-width: 0;
  }

  .lp-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
  }

  .lp-badge-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent-color, #FF3621);
    flex-shrink: 0;
  }

  .lp-badge-text {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--config--main-color-text, #6b7280);
  }

  .lp-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--config--main-color-text, #111827);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .lp-cta {
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 18px;
    border-radius: 6px;
    background: #111827;
    color: #ffffff;
    font-size: 13px;
    font-weight: 600;
    text-decoration: none;
    white-space: nowrap;
    cursor: pointer;
    transition: opacity 0.15s ease;
    border: none;
    font-family: inherit;
  }

  .lp-cta:hover {
    opacity: 0.85;
  }

  .lp-cta-arrow {
    font-size: 15px;
    line-height: 1;
  }
</style>

<div class="lp-banner">
  <div class="lp-icon-wrap">
    <img class="lp-icon-img" src="" alt="" />
  </div>

  <div class="lp-content">
    <div class="lp-badge">
      <span class="lp-badge-dot"></span>
      <span class="lp-badge-text">NEW LEARNING PATH</span>
    </div>
    <div class="lp-title">Analytics Fundamentals Accreditation</div>
  </div>

  <a class="lp-cta" href="#" target="_blank" rel="noopener noreferrer">
    <span class="lp-cta-label">Explore Now</span>
    <span class="lp-cta-arrow">→</span>
  </a>
</div>

<script type="module" src="app.js"></script>
