<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  .banner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(135deg, #f0f4ff 0%, #e8f0fe 100%);
    border-radius: 12px;
    padding: 20px 28px;
    border: 1px solid #dbe4f7;
    gap: 20px;
    font-family: var(--config--main-font-family, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif);
    min-height: 80px;
    position: relative;
    overflow: hidden;
  }

  .banner::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 5px;
    background: #1B1B1B;
    border-radius: 12px 0 0 12px;
  }

  .left {
    display: flex;
    align-items: center;
    gap: 18px;
    flex: 1;
    min-width: 0;
  }

  .icon-circle {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: #1B1B1B;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .icon-circle svg {
    width: 30px;
    height: 30px;
  }

  .text-block {
    min-width: 0;
  }

  .label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #FF3621;
    margin-bottom: 4px;
  }

  .title {
    font-size: 17px;
    font-weight: 700;
    color: #1B1B1B;
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .cta-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #1B1B1B;
    color: #ffffff;
    font-size: 14px;
    font-weight: 600;
    padding: 10px 20px;
    border-radius: 8px;
    text-decoration: none;
    white-space: nowrap;
    flex-shrink: 0;
    transition: background 0.15s ease, transform 0.1s ease;
    cursor: pointer;
    border: none;
    font-family: inherit;
  }

  .cta-btn:hover {
    background: #FF3621;
    transform: translateY(-1px);
  }

  .cta-btn:active {
    transform: translateY(0);
  }

  .arrow {
    font-size: 16px;
    line-height: 1;
  }
</style>

<div class="banner">
  <div class="left">
    <div class="icon-circle">
      <!-- Databricks "D" wordmark icon -->
      <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 6L6 14v12l14 8 14-8V14L20 6z" fill="#FF3621"/>
        <path d="M20 10L9 16.5v7L20 30l11-6.5v-7L20 10z" fill="#ffffff" opacity="0.15"/>
        <text x="50%" y="54%" dominant-baseline="middle" text-anchor="middle"
              font-family="-apple-system, sans-serif" font-size="14" font-weight="800"
              fill="#ffffff">DB</text>
      </svg>
    </div>
    <div class="text-block">
      <div class="label" id="banner-label">NEW ACCREDITATION</div>
      <div class="title" id="banner-title">Analytics Fundamentals</div>
    </div>
  </div>
  <a class="cta-btn" id="cta-btn" href="#" target="_blank" rel="noopener noreferrer">
    <span id="cta-text">Start Learning</span>
    <span class="arrow">→</span>
  </a>
</div>

<script type="module" src="app.js"></script>
