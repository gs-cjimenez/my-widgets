<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :host { display: block; font-family: var(--config--main-font-family, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif); }

  .section {
    background: #f0f1f2;
    padding: 3rem 2rem 2.5rem;
  }

  .section-heading {
    text-align: center;
    font-size: 2.5rem;
    font-weight: 900;
    color: #111;
    margin-bottom: 2rem;
    letter-spacing: -0.03em;
    line-height: 1.1;
  }

  /* Outer wrapper positions arrows outside the visible card area */
  .carousel-outer {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .nav-btn {
    flex-shrink: 0;
    background: none;
    border: none;
    cursor: pointer;
    color: #555;
    font-size: 2rem;
    line-height: 1;
    padding: 0.25rem 0.5rem;
    transition: color 0.15s;
    user-select: none;
  }
  .nav-btn:hover { color: #111; }
  .nav-btn:disabled { color: #ccc; cursor: default; }

  .carousel-track-container {
    flex: 1;
    overflow: hidden;
  }

  .carousel-track {
    display: flex;
    gap: 16px;
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* Each card = (100% - gap) / 2 so exactly 2 fit */
  .member-card {
    display: flex;
    flex: 0 0 calc(50% - 8px);
    min-height: 340px;
    border-radius: 0;
    overflow: hidden;
    background: #fff;
  }

  /* ── LEFT PANEL ── */
  .card-left {
    width: 230px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.25rem 1.75rem;
    gap: 0.5rem;
  }

  .avatar-wrap {
    width: 145px;
    height: 145px;
    border-radius: 50%;
    overflow: hidden;
    flex-shrink: 0;
    background: rgba(255,255,255,0.45);
    margin-bottom: 0.75rem;
  }

  .avatar-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .avatar-initials {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.75rem;
    font-weight: 700;
    color: rgba(0,0,0,0.32);
  }

  .member-name {
    font-size: 1.0625rem;
    font-weight: 700;
    color: #111;
    text-align: center;
    line-height: 1.2;
  }

  .member-username {
    font-size: 0.875rem;
    font-weight: 400;
    color: #2563eb;
    text-align: center;
  }

  /* ── RIGHT PANEL ── */
  .card-right {
    flex: 1;
    background: #fff;
    padding: 1.5rem 1.75rem;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .fields { display: flex; flex-direction: column; gap: 1.125rem; }

  .field-label {
    font-size: 1rem;
    font-weight: 700;
    color: #111;
    margin-bottom: 0.2rem;
    line-height: 1.3;
  }

  .field-value {
    font-size: 1rem;
    color: #374151;
    line-height: 1.5;
  }

  .field-value strong {
    font-weight: 700;
    color: #111;
  }

  .card-meta {
    margin-top: 1.25rem;
    font-size: 0.6875rem;
    font-weight: 500;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: #9ca3af;
    line-height: 1.6;
  }

  /* ── DOTS ── */
  .dots {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 0.45rem;
    margin-top: 1.5rem;
  }

  .dot {
    width: 0.5rem;
    height: 0.5rem;
    border-radius: 50%;
    border: 1.5px solid #6b7280;
    background: transparent;
    cursor: pointer;
    padding: 0;
    transition: background 0.2s, border-color 0.2s;
  }

  .dot.active {
    background: #111;
    border-color: #111;
  }
</style>

<div class="section">
  <h2 class="section-heading">Meet the community</h2>

  <div class="carousel-outer">
    <button class="nav-btn prev" aria-label="Previous">&#8249;</button>
    <div class="carousel-track-container">
      <div class="carousel-track"></div>
    </div>
    <button class="nav-btn next" aria-label="Next">&#8250;</button>
  </div>

  <div class="dots"></div>
</div>

<script type="module" src="app.js"></script>
